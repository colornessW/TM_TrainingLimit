name: Build TM_TrainingLimit

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: skyrim-se
            cmake_flags: -DENABLE_SKYRIM_SE=ON -DENABLE_SKYRIM_AE=OFF -DENABLE_SKYRIM_VR=OFF
          - target: skyrim-ae
            cmake_flags: -DENABLE_SKYRIM_SE=OFF -DENABLE_SKYRIM_AE=ON -DENABLE_SKYRIM_VR=OFF
          - target: skyrim-vr
            cmake_flags: -DENABLE_SKYRIM_SE=OFF -DENABLE_SKYRIM_AE=OFF -DENABLE_SKYRIM_VR=ON

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone CommonLibSSE-NG
        run: git clone --depth 1 --branch v3.7.0 https://github.com/CharmedBaryon/CommonLibSSE-NG.git skse-plugin/CommonLibSSE-NG

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install deps
        run: |
          git clone https://github.com/Microsoft/vcpkg.git ${{ runner.temp }}/vcpkg
          ${{ runner.temp }}/vcpkg/bootstrap-vcpkg.bat
          ${{ runner.temp }}/vcpkg/vcpkg.exe install spdlog:x64-windows-static rapidcsv:x64-windows-static

      - name: Configure CMake
        run: |
          $vcpkgRoot = "${{ runner.temp }}/vcpkg"
          cmake -B build -S skse-plugin ${{ matrix.cmake_flags }} -DBUILD_TESTS=OFF -DSKSE_SUPPORT_XBYAK=OFF -DCMAKE_TOOLCHAIN_FILE="$vcpkgRoot/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: |
          New-Item -ItemType Directory -Path dist -Force
          Copy-Item build/Release/z_TM_TrainingLimit.dll dist/ -ErrorAction SilentlyContinue
          Copy-Item build/Release/z_TM_TrainingLimit.pdb dist/ -ErrorAction SilentlyContinue
          Copy-Item dist/TM_TrainingLimit.ini dist/ -ErrorAction SilentlyContinue

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: TM_TrainingLimit-${{ matrix.target }}
          path: dist/
